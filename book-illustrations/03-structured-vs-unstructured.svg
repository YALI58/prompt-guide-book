  <circle cx="400" cy="305" r="4" fill="#ef4444" opacity="0.6" id="svg_32"/>
  <text x="235" y="325" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#991b1b" text-anchor="middle" id="svg_33">指令、代码、格式要求混在一起 → 模型难以聚焦</text>
  <rect x="45" y="345" width="380" height="130" rx="8" fill="#1a0505" stroke="#450a0a" id="svg_34"/>
  <text x="60" y="365" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="600" fill="#fca5a5" id="svg_35">⚠️ 常见问题</text>
  <text x="60" y="385" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#fca5a5" id="svg_36">1. 任务边界模糊 → 模型不确定该做什么</text>
  <text x="60" y="403" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#fca5a5" id="svg_37">2. 约束隐藏在指令中 → 容易被忽略</text>
  <text x="60" y="421" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#fca5a5" id="svg_38">3. 输出格式未指定 → 结果不可控</text>
  <text x="60" y="439" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#fca5a5" id="svg_39">4. 角色缺失 → 模型使用默认泛化模式</text>
  <text x="60" y="457" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#fca5a5" id="svg_40">5. 示例无 → 依赖 Zero-Shot 推理</text>
  <rect x="45" y="490" width="380" height="65" rx="8" fill="#2d0a0a" stroke="#7f1d1d" id="svg_41"/>
  <text x="60" y="510" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#f87171" id="svg_42">输出（不稳定）：</text>
  <text x="60" y="528" font-family="'Consolas', monospace" font-size="9" fill="#fca5a5" id="svg_43">"这段代码可以用for循环改写，</text>
  <text x="60" y="543" font-family="'Consolas', monospace" font-size="9" fill="#fca5a5" id="svg_44">另外变量命名可以更清楚一些..."</text>
  <line x1="450" y1="300" x2="465" y2="300" stroke="#94a3b8" stroke-width="3" marker-end="url(#arr)" id="svg_45"/>
  <rect x="470" y="60" width="410" height="540" rx="12" fill="#0a1a0a" stroke="#10b981" stroke-width="2" id="svg_46"/>
  <text x="690" y="88" font-family="'Segoe UI', Arial, sans-serif" font-size="15" font-weight="700" fill="#6ee7b7" text-anchor="middle" id="svg_47">✅ 结构化 Prompt</text>
  <rect x="485" y="100" width="380" height="120" rx="8" fill="#052e16" stroke="#166534" id="svg_48"/>
  <text x="500" y="118" font-family="'Consolas', monospace" font-size="9" fill="#4ade80" id="svg_49"># 角色</text>
  <text x="500" y="133" font-family="'Consolas', monospace" font-size="9" fill="#86efac" id="svg_50">你是一位 Python 性能优化专家。</text>
  <text x="500" y="153" font-family="'Consolas', monospace" font-size="9" fill="#4ade80" id="svg_51"># 任务</text>
  <text x="500" y="168" font-family="'Consolas', monospace" font-size="9" fill="#86efac" id="svg_52">审查以下代码，识别性能瓶颈。</text>
  <text x="500" y="188" font-family="'Consolas', monospace" font-size="9" fill="#4ade80" id="svg_53"># 输出格式</text>
  <text x="500" y="203" font-family="'Consolas', monospace" font-size="9" fill="#86efac" id="svg_54">按严重程度分级：🔴严重 🟡中等 🟢轻微</text>
  <text x="500" y="218" font-family="'Consolas', monospace" font-size="9" fill="#86efac" id="svg_55">每条附代码位置和优化方案。</text>
  <line x1="690" y1="220" x2="690" y2="245" stroke="#10b981" stroke-width="2" marker-end="url(#arrG)" id="svg_56"/>
