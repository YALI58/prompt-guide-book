  <circle cx="545" cy="310" r="5" fill="#10b981" opacity="0.7" id="svg_63"/>
  <text x="620" y="292" font-family="'Segoe UI', Arial, sans-serif" font-size="8" fill="#4ade80" id="svg_64">任务区</text>
  <circle cx="595" cy="305" r="6" fill="#10b981" opacity="0.95" id="svg_65"/>
