  <circle cx="640" cy="308" r="6" fill="#10b981" opacity="0.85" id="svg_67"/>
  <text x="760" y="292" font-family="'Segoe UI', Arial, sans-serif" font-size="8" fill="#4ade80" id="svg_68">格式区</text>
  <circle cx="730" cy="305" r="5" fill="#10b981" opacity="0.9" id="svg_69"/>
  <circle cx="755" cy="300" r="4" fill="#10b981" opacity="0.85" id="svg_70"/>
  <circle cx="775" cy="310" r="5" fill="#10b981" opacity="0.8" id="svg_71"/>
  <text x="675" y="340" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#115e59" text-anchor="middle" id="svg_72">各区域内部注意力集中，跨区干扰小 → 任务执行更精准</text>
  <rect x="485" y="365" width="380" height="115" rx="8" fill="#022c22" stroke="#134e4a" id="svg_73"/>
  <text x="500" y="385" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="600" fill="#6ee7b7" id="svg_74">✨ 优势</text>
  <text x="500" y="405" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#6ee7b7" id="svg_75">1. 角色定义 → 激活专业模式，减少泛化</text>
  <text x="500" y="423" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#6ee7b7" id="svg_76">2. 分区标注 → 注意力自然聚焦于对应区域</text>
  <text x="500" y="441" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#6ee7b7" id="svg_77">3. 输出格式明确 → 结果可预测、可解析</text>
  <text x="500" y="459" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#6ee7b7" id="svg_78">4. 约束独立 → 不会被指令语句淹没</text>
  <rect x="485" y="495" width="380" height="85" rx="8" fill="#052e16" stroke="#166534" id="svg_79"/>
  <text x="500" y="513" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#4ade80" id="svg_80">输出（稳定、结构化）：</text>
  <text x="500" y="530" font-family="'Consolas', monospace" font-size="9" fill="#86efac" id="svg_81">🔴 严重：第12行嵌套循环 O(n²)</text>
  <text x="500" y="545" font-family="'Consolas', monospace" font-size="9" fill="#86efac" id="svg_82">→ 用字典预处理降至 O(n)</text>
  <text x="500" y="560" font-family="'Consolas', monospace" font-size="9" fill="#86efac" id="svg_83">🟡 中等：第8行重复创建临时对象</text>
  <text x="500" y="575" font-family="'Consolas', monospace" font-size="9" fill="#86efac" id="svg_84">→ 提取到循环外复用</text>
