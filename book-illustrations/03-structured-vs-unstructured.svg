 <g>
  <title>Layer 1</title>
  <rect width="900" height="620" fill="url(#bg)" rx="12" id="svg_4" y="0" x="1"/>
  <text x="450" y="35" font-family="'Segoe UI', Arial, sans-serif" font-size="20" font-weight="700" fill="#e2e8f0" text-anchor="middle" id="svg_5">结构化 vs 非结构化 Prompt 的模型处理差异</text>
  <rect x="30" y="60" width="410" height="540" rx="12" fill="#1a0a0a" stroke="#ef4444" stroke-width="2" id="svg_6"/>
  <text x="235" y="88" font-family="'Segoe UI', Arial, sans-serif" font-size="15" font-weight="700" fill="#fca5a5" text-anchor="middle" id="svg_7">❌ 非结构化 Prompt</text>
  <rect x="45" y="100" width="380" height="95" rx="8" fill="#2d0a0a" stroke="#7f1d1d" id="svg_8"/>
  <text x="60" y="120" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#f87171" id="svg_9">输入：</text>
  <text x="60" y="137" font-family="'Consolas', monospace" font-size="9" fill="#fca5a5" id="svg_10">帮我看看这段代码有什么问题，</text>
  <text x="60" y="152" font-family="'Consolas', monospace" font-size="9" fill="#fca5a5" id="svg_11">性能不太好，顺便优化一下，</text>
  <text x="60" y="167" font-family="'Consolas', monospace" font-size="9" fill="#fca5a5" id="svg_12">用中文回答，简单点说就行</text>
  <text x="60" y="182" font-family="'Consolas', monospace" font-size="9" fill="#fca5a5" id="svg_13">[粘贴了一大段代码...]</text>
  <line x1="235" y1="195" x2="235" y2="225" stroke="#ef4444" stroke-width="2" marker-end="url(#arrR)" id="svg_14"/>
