<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>
  
  <rect width="900" height="600" fill="url(#bg)" rx="12"/>
  <text x="450" y="35" font-family="'Segoe UI', Arial, sans-serif" font-size="20" font-weight="700" fill="#e2e8f0" text-anchor="middle">Zero-Shot → Few-Shot → CoT 策略对比</text>
  
  <!-- Shared question -->
  <rect x="200" y="55" width="500" height="40" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="450" y="80" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">📋 问题："一个农场有 15 头牛，每头牛每天产 20 升牛奶，一周共产多少升？"</text>
  
  <!-- ═══════ COLUMN 1: Zero-Shot ═══════ -->
  <rect x="25" y="110" width="270" height="470" rx="12" fill="#0f172a" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="160" y="138" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="700" fill="#93c5fd" text-anchor="middle">🎯 Zero-Shot</text>
  <text x="160" y="156" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">无示例，直接指令</text>
  
  <!-- Input -->
  <rect x="40" y="170" width="240" height="55" rx="6" fill="#172554" stroke="#1e3a5f" stroke-width="1"/>
  <text x="55" y="188" font-family="'Consolas', monospace" font-size="9" fill="#93c5fd">请回答以下问题：</text>
  <text x="55" y="202" font-family="'Consolas', monospace" font-size="9" fill="#93c5fd">15头牛，每头每天20升，</text>
  <text x="55" y="216" font-family="'Consolas', monospace" font-size="9" fill="#93c5fd">一周共产多少升？</text>
  
  <!-- Arrow -->
  <line x1="160" y1="225" x2="160" y2="248" stroke="#60a5fa" stroke-width="2" marker-end="url(#arr)"/>
  
  <!-- Processing - single hop -->
  <rect x="55" y="252" width="210" height="50" rx="6" fill="#1e3a5f" stroke="#2563eb" stroke-width="1"/>
  <text x="160" y="272" font-family="'Segoe UI', Arial, sans-serif" font-size="10" font-weight="600" fill="#bfdbfe" text-anchor="middle">⚡ 单步推理</text>
  <text x="160" y="290" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">模型直接计算 P(answer|question)</text>
  
  <!-- Arrow -->
  <line x1="160" y1="302" x2="160" y2="320" stroke="#60a5fa" stroke-width="2" marker-end="url(#arr)"/>
  
  <!-- Output -->
  <rect x="40" y="325" width="240" height="40" rx="6" fill="#172554" stroke="#1e3a5f" stroke-width="1"/>
  <text x="160" y="345" font-family="'Consolas', monospace" font-size="11" fill="#93c5fd" text-anchor="middle">答：2100 升</text>
  <text x="160" y="360" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">（有时正确，有时出错）</text>
  
  <!-- Pros/Cons -->
  <rect x="40" y="380" width="240" height="185" rx="6" fill="#0c1322" stroke="#334155" stroke-width="1"/>
  <text x="160" y="400" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="600" fill="#bfdbfe" text-anchor="middle">📊 特征</text>
  <text x="55" y="422" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#4ade80">✓ Token 消耗最少</text>
  <text x="55" y="440" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#4ade80">✓ 响应速度最快</text>
  <text x="55" y="458" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#4ade80">✓ 适合简单任务</text>
  <text x="55" y="480" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#f87171">✗ 复杂推理不稳定</text>
  <text x="55" y="498" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#f87171">✗ 输出格式不可控</text>
  <text x="55" y="516" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#f87171">✗ 无法示范期望行为</text>
  <text x="55" y="542" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#fbbf24">准确率：~60-70%（数学）</text>
  
  <!-- ═══════ COLUMN 2: Few-Shot ═══════ -->
  <rect x="315" y="110" width="270" height="470" rx="12" fill="#0f172a" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="450" y="138" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="700" fill="#c4b5fd" text-anchor="middle">📚 Few-Shot</text>
  <text x="450" y="156" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">提供示例示范格式</text>
  
  <!-- Input -->
  <rect x="330" y="170" width="240" height="85" rx="6" fill="#2e1065" stroke="#4c1d95" stroke-width="1"/>
  <text x="345" y="188" font-family="'Consolas', monospace" font-size="8" fill="#c4b5fd">示例：小明有3个苹果，又买了</text>
  <text x="345" y="200" font-family="'Consolas', monospace" font-size="8" fill="#c4b5fd">2袋（每袋4个），共11个。✓</text>
  <text x="345" y="218" font-family="'Consolas', monospace" font-size="8" fill="#c4b5fd">问题：15头牛，每头每天20升，</text>
  <text x="345" y="230" font-family="'Consolas', monospace" font-size="8" fill="#c4b5fd">一周共产多少升？</text>
  <text x="345" y="246" font-family="'Consolas', monospace" font-size="8" fill="#a78bfa">格式模式已被学习 ↑</text>
  
  <!-- Arrow -->
  <line x1="450" y1="255" x2="450" y2="275" stroke="#a78bfa" stroke-width="2" marker-end="url(#arr)"/>
  
  <!-- Processing -->
  <rect x="345" y="278" width="210" height="50" rx="6" fill="#2e1065" stroke="#4c1d95" stroke-width="1"/>
  <text x="450" y="298" font-family="'Segoe UI', Arial, sans-serif" font-size="10" font-weight="600" fill="#c4b5fd" text-anchor="middle">⚡ 模式匹配 + 推理</text>
  <text x="450" y="316" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">模仿示例的格式和推理路径</text>
  
  <!-- Arrow -->
  <line x1="450" y1="328" x2="450" y2="345" stroke="#a78bfa" stroke-width="2" marker-end="url(#arr)"/>
  
  <!-- Output -->
  <rect x="330" y="348" width="240" height="40" rx="6" fill="#2e1065" stroke="#4c1d95" stroke-width="1"/>
  <text x="450" y="368" font-family="'Consolas', monospace" font-size="10" fill="#c4b5fd" text-anchor="middle">15×20=300升/天，300×7=2100升 ✓</text>
  <text x="450" y="383" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">格式模仿提高了稳定性</text>
  
  <!-- Pros/Cons -->
  <rect x="330" y="403" width="240" height="162" rx="6" fill="#0c1322" stroke="#334155" stroke-width="1"/>
  <text x="450" y="423" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="600" fill="#c4b5fd" text-anchor="middle">📊 特征</text>
  <text x="345" y="445" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#4ade80">✓ 输出格式可控</text>
  <text x="345" y="463" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#4ade80">✓ 隐式规则传递</text>
  <text x="345" y="481" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#f87171">✗ 消耗额外 Token</text>
  <text x="345" y="499" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#f87171">✗ 推理过程仍然隐式</text>
  <text x="345" y="532" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#fbbf24">准确率：~75-85%（数学）</text>
  
  <!-- ═══════ COLUMN 3: CoT ═══════ -->
  <rect x="605" y="110" width="270" height="470" rx="12" fill="#0f172a" stroke="#34d399" stroke-width="1.5"/>
  <text x="740" y="138" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="700" fill="#6ee7b7" text-anchor="middle">🔗 Chain of Thought</text>
  <text x="740" y="156" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">展示推理过程</text>
  
  <!-- Input -->
  <rect x="620" y="170" width="240" height="95" rx="6" fill="#052e16" stroke="#166534" stroke-width="1"/>
  <text x="635" y="188" font-family="'Consolas', monospace" font-size="8" fill="#6ee7b7">示例：</text>
  <text x="635" y="200" font-family="'Consolas', monospace" font-size="8" fill="#86efac">小明有3个苹果，又买了2袋</text>
  <text x="635" y="212" font-family="'Consolas', monospace" font-size="8" fill="#86efac">（每袋4个）。3+2×4=11个 ✓</text>
  <text x="635" y="230" font-family="'Consolas', monospace" font-size="8" fill="#6ee7b7">问题：15头牛，每头每天20升，</text>
  <text x="635" y="242" font-family="'Consolas', monospace" font-size="8" fill="#86efac">一周共产多少升？让我们一步步思考。</text>
  <text x="635" y="258" font-family="'Consolas', monospace" font-size="8" fill="#34d399">推理过程被示范 ↑</text>
  
  <!-- Arrow -->
  <line x1="740" y1="265" x2="740" y2="282" stroke="#34d399" stroke-width="2" marker-end="url(#arr)"/>
  
  <!-- Processing - multi-step -->
  <rect x="630" y="285" width="220" height="65" rx="6" fill="#052e16" stroke="#166534" stroke-width="1"/>
  <text x="740" y="303" font-family="'Segoe UI', Arial, sans-serif" font-size="10" font-weight="600" fill="#6ee7b7" text-anchor="middle">⚡ 多步推理链</text>
  <text x="645" y="320" font-family="'Consolas', monospace" font-size="8" fill="#86efac">Step1: 15×20=300升/天</text>
  <text x="645" y="332" font-family="'Consolas', monospace" font-size="8" fill="#86efac">Step2: 300×7=2100升/周</text>
  <text x="645" y="344" font-family="'Consolas', monospace" font-size="8" fill="#34d399">→ 每步可验证、可追溯</text>
  
  <!-- Arrow -->
  <line x1="740" y1="350" x2="740" y2="368" stroke="#34d399" stroke-width="2" marker-end="url(#arr)"/>
  
  <!-- Output -->
  <rect x="620" y="370" width="240" height="50" rx="6" fill="#052e16" stroke="#166534" stroke-width="1"/>
  <text x="740" y="390" font-family="'Consolas', monospace" font-size="10" fill="#6ee7b7" text-anchor="middle">答案：2100 升 ✓</text>
  <text x="740" y="408" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">推理过程透明，错误可定位</text>
  
  <!-- Pros/Cons -->
  <rect x="620" y="435" width="240" height="130" rx="6" fill="#0c1322" stroke="#334155" stroke-width="1"/>
  <text x="740" y="455" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="600" fill="#6ee7b7" text-anchor="middle">📊 特征</text>
  <text x="635" y="477" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#4ade80">✓ 复杂推理准确率最高</text>
  <text x="635" y="495" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#4ade80">✓ 推理过程可审查</text>
  <text x="635" y="513" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#f87171">✗ Token 消耗最高</text>
  <text x="635" y="536" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#fbbf24">准确率：~85-95%（数学）</text>
  
  <!-- Bottom: Strategy selection -->
  <rect x="25" y="570" width="850" height="22" rx="6" fill="#0c1322"/>
  <text x="450" y="586" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">💡 策略：从 Zero-Shot 开始 → 效果不好加 Few-Shot → 需要推理加 CoT → 渐进式升级</text>
</svg>