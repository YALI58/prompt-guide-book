<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
    <marker id="arrG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10b981"/>
    </marker>
    <marker id="arrR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444"/>
    </marker>
  </defs>
  
  <rect width="900" height="600" fill="url(#bg)" rx="12"/>
  <text x="450" y="35" font-family="'Segoe UI', Arial, sans-serif" font-size="20" font-weight="700" fill="#e2e8f0" text-anchor="middle">Self-Consistency 多路径投票机制</text>
  
  <!-- Problem -->
  <rect x="320" y="55" width="260" height="45" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="450" y="75" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="600" fill="#e2e8f0" text-anchor="middle">❓ 问题</text>
  <text x="450" y="92" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">15头牛，每头每天20升，一周共产多少？</text>
  
  <!-- Three reasoning paths -->
  <!-- Path 1 -->
  <line x1="450" y1="100" x2="150" y2="140" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="450" y1="100" x2="450" y2="140" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="450" y1="100" x2="750" y2="140" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,3"/>
  
  <!-- Path 1 -->
  <rect x="50" y="145" width="200" height="180" rx="10" fill="#0c1322" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="150" y="168" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="600" fill="#93c5fd" text-anchor="middle">路径 1 (T=0.7)</text>
  <rect x="65" y="178" width="170" height="75" rx="5" fill="#172554"/>
  <text x="80" y="195" font-family="'Consolas', monospace" font-size="9" fill="#93c5fd">思考：15头牛每天产奶</text>
  <text x="80" y="210" font-family="'Consolas', monospace" font-size="9" fill="#93c5fd">15 × 20 = 300升/天</text>
  <text x="80" y="225" font-family="'Consolas', monospace" font-size="9" fill="#93c5fd">一周7天：300 × 7</text>
  <text x="80" y="240" font-family="'Consolas', monospace" font-size="9" fill="#93c5fd">= 2100升</text>
  <rect x="65" y="262" width="170" height="30" rx="5" fill="#052e16" stroke="#166534" stroke-width="1"/>
  <text x="150" y="282" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="600" fill="#4ade80" text-anchor="middle">✅ 答案：2100</text>
  
  <!-- Path 2 -->
  <rect x="350" y="145" width="200" height="180" rx="10" fill="#0c1322" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="450" y="168" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="600" fill="#c4b5fd" text-anchor="middle">路径 2 (T=0.7)</text>
  <rect x="365" y="178" width="170" height="75" rx="5" fill="#2e1065"/>
  <text x="380" y="195" font-family="'Consolas', monospace" font-size="9" fill="#c4b5fd">先算一天：15×20=300</text>
  <text x="380" y="210" font-family="'Consolas', monospace" font-size="9" fill="#c4b5fd">再算一周：300×7=2100</text>
  <text x="380" y="225" font-family="'Consolas', monospace" font-size="9" fill="#c4b5fd">总产量就是2100升</text>
  <text x="380" y="240" font-family="'Consolas', monospace" font-size="9" fill="#c4b5fd">单位：升/周 ✓</text>
  <rect x="365" y="262" width="170" height="30" rx="5" fill="#052e16" stroke="#166534" stroke-width="1"/>
  <text x="450" y="282" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="600" fill="#4ade80" text-anchor="middle">✅ 答案：2100</text>
  
  <!-- Path 3 -->
  <rect x="650" y="145" width="200" height="180" rx="10" fill="#0c1322" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="750" y="168" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="600" fill="#fcd34d" text-anchor="middle">路径 3 (T=0.7)</text>
  <rect x="665" y="178" width="170" height="75" rx="5" fill="#422006"/>
  <text x="680" y="195" font-family="'Consolas', monospace" font-size="9" fill="#fcd34d">每头牛周产：20×7=140升</text>
  <text x="680" y="210" font-family="'Consolas', monospace" font-size="9" fill="#fcd34d">15头牛：140×15=2100升</text>
  <text x="680" y="225" font-family="'Consolas', monospace" font-size="9" fill="#fcd34d">答：一周共产2100升</text>
  <text x="680" y="240" font-family="'Consolas', monospace" font-size="9" fill="#fcd34d">（两种算法结果一致）</text>
  <rect x="665" y="262" width="170" height="30" rx="5" fill="#052e16" stroke="#166534" stroke-width="1"/>
  <text x="750" y="282" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="600" fill="#4ade80" text-anchor="middle">✅ 答案：2100</text>
  
  <!-- Convergence arrows -->
  <line x1="150" y1="325" x2="450" y2="370" stroke="#10b981" stroke-width="2" marker-end="url(#arrG)"/>
  <line x1="450" y1="325" x2="450" y2="370" stroke="#10b981" stroke-width="2" marker-end="url(#arrG)"/>
  <line x1="750" y1="325" x2="450" y2="370" stroke="#10b981" stroke-width="2" marker-end="url(#arrG)"/>
  
  <!-- Voting -->
  <rect x="320" y="375" width="260" height="55" rx="10" fill="#052e16" stroke="#10b981" stroke-width="2"/>
  <text x="450" y="398" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="700" fill="#6ee7b7" text-anchor="middle">🗳️ 多数投票 (Majority Vote)</text>
  <text x="450" y="418" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#86efac" text-anchor="middle">2100: 3票 | 其他: 0票 → 最终答案：2100 ✓</text>
  
  <!-- Alternative scenario -->
  <rect x="50" y="455" width="800" height="125" rx="10" fill="#0c1322" stroke="#475569" stroke-width="1"/>
  <text x="450" y="478" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="600" fill="#e2e8f0" text-anchor="middle">🔄 当路径分歧时的投票示例</text>
  
  <rect x="70" y="490" width="230" height="75" rx="6" fill="#172554"/>
  <text x="185" y="510" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#93c5fd" text-anchor="middle">路径1: 15×20×7 = 2100</text>
  <text x="185" y="528" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#4ade80" text-anchor="middle">✅ 答案：2100</text>
  <text x="185" y="555" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">+1 票</text>
  
  <rect x="325" y="490" width="230" height="75" rx="6" fill="#172554"/>
  <text x="440" y="510" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#93c5fd" text-anchor="middle">路径2: 15×20×7 = 2100</text>
  <text x="440" y="528" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#4ade80" text-anchor="middle">✅ 答案：2100</text>
  <text x="440" y="555" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">+1 票</text>
  
  <rect x="580" y="490" width="230" height="75" rx="6" fill="#2d0a0a"/>
  <text x="695" y="510" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#fca5a5" text-anchor="middle">路径3: 算错 → 2205</text>
  <text x="695" y="528" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#f87171" text-anchor="middle">❌ 答案：2205</text>
  <text x="695" y="555" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">+1 票（被否决）</text>
  
  <!-- Bottom note -->
  <rect x="200" y="565" width="500" height="25" rx="6" fill="#1e293b"/>
  <text x="450" y="582" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#fbbf24" text-anchor="middle">💡 即使单条路径出错，多数投票仍能给出正确答案 → 提升推理鲁棒性</text>
</svg>